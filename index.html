<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Wiki Fiable</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
<h2>Mini Wiki</h2>
<button onclick="createPage()">➕ Nouvelle page</button>
<button onclick="toggleDark()">🌙 Mode sombre</button>
<input type="text" id="search" placeholder="Rechercher..." oninput="searchPages()">
<div id="pageList"></div>
</div>

<div id="main">
<h1 id="pageTitle">Accueil</h1>

<div id="toolbar">
<button onclick="wrapTag('b')"><b>B</b></button>
<button onclick="wrapTag('i')"><i>I</i></button>
<button onclick="wrapTag('u')"><u>U</u></button>
<select onchange="changeSize(this.value)">
<option value="16">16px</option>
<option value="20">20px</option>
<option value="24">24px</option>
</select>
<button onclick="addLink()">🔗 Lien</button>
<button onclick="addImage()">🖼 Image</button>
<button onclick="addVideo()">🎥 Vidéo</button>
<button onclick="savePage()">💾 Sauvegarder</button>
<button onclick="showHistory()">🕑 Historique</button>
</div>

<div id="editor" contenteditable="true"></div>

<div id="history" style="display:none;"></div>

<input type="file" id="fileInput" style="display:none" onchange="uploadImage(event)">
</div>

<script src="script.js"></script>
</body>
</html>
